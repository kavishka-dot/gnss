<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNSS · IQ Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f1117;
  --panel:   #161b24;
  --border:  rgba(255,255,255,0.07);
  --hover:   rgba(255,255,255,0.04);
  --text:    #e2e8f0;
  --muted:   #64748b;
  --green:   #34d399;
  --blue:    #60a5fa;
  --red:     #f87171;
  --amber:   #fbbf24;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', sans-serif;
  --r:       8px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
  font-size: 13px;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
aside {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

aside::-webkit-scrollbar { width: 3px; }
aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.brand {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
}
.brand-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  font-family: var(--mono);
}
.status-row {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}
.chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #2d3748;
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.chip-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }

/* ── SECTION ────────────────────────────────────────────── */
.section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.step-num {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  font-size: 9px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  font-weight: 600;
  flex-shrink: 0;
}

/* ── FORM ────────────────────────────────────────────────── */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.row.single { grid-template-columns: 1fr; }

.field label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

select, input[type=number], input[type=text] {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 9px;
  border-radius: 5px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
select { cursor: pointer; }
select:focus, input:focus {
  border-color: rgba(96,165,250,0.5);
  background: rgba(96,165,250,0.04);
}
select option { background: #1e2533; }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:active:not(:disabled) { transform: scale(0.98); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-primary {
  background: var(--green);
  color: #0f1117;
}
.btn-primary:hover:not(:disabled) { opacity: 0.85; }

.btn-blue {
  background: var(--blue);
  color: #0f1117;
}
.btn-blue:hover:not(:disabled) { opacity: 0.85; }

.btn-ghost {
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: var(--text); }

.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }

/* ── READY HINT ──────────────────────────────────────────── */
.hint {
  display: none;
  padding: 7px 10px;
  border-radius: 5px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.2);
  font-size: 11px;
  color: var(--green);
  margin-top: 8px;
  text-align: center;
  font-family: var(--mono);
}

/* ── STATS STRIP ─────────────────────────────────────────── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 8px;
}
.stat-k {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.stat-v {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  margin-top: 2px;
  font-weight: 500;
}

/* ── CANVASES ────────────────────────────────────────────── */
.canvas-wrap {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 6px;
}
canvas { display: block; width: 100%; }

.canvas-label {
  position: absolute;
  top: 6px; left: 8px;
  font-size: 9px;
  font-family: var(--mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  pointer-events: none;
}

/* ── FILE DROP ───────────────────────────────────────────── */
#dropzone {
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 8px;
}
#dropzone:hover, #dropzone.over {
  border-color: rgba(96,165,250,0.4);
  background: rgba(96,165,250,0.03);
}
#dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
#dz-hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
#dz-file { font-size: 11px; font-family: var(--mono); color: var(--blue); margin-top: 3px; word-break: break-all; }

/* ── LOG ─────────────────────────────────────────────────── */
#log {
  font-family: var(--mono);
  font-size: 10px;
  line-height: 1.9;
  max-height: 80px;
  overflow-y: auto;
  color: var(--muted);
}
#log::-webkit-scrollbar { width: 2px; }
#log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
#log .ok   { color: var(--green); }
#log .wn   { color: var(--red); }
#log .inf  { color: var(--text); }

/* ── MAP ─────────────────────────────────────────────────── */
main { position: relative; overflow: hidden; }
#map  { width: 100%; height: 100%; }

/* dark tiles */
.leaflet-tile-pane { filter: brightness(0.7) saturate(0.4) hue-rotate(180deg) invert(1); }
.leaflet-marker-icon, .leaflet-marker-shadow { filter: none !important; }

/* ── MAP OVERLAYS ────────────────────────────────────────── */
.map-card {
  position: absolute;
  z-index: 1000;
  background: rgba(15,17,23,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  font-family: var(--mono);
}

#fix-card {
  top: 16px; left: 16px;
  display: none;
  min-width: 160px;
}
.fix-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.fix-coords { font-size: 14px; color: var(--blue); line-height: 1.7; font-weight: 500; }

#risk-card {
  top: 16px; right: 16px;
  display: none;
  text-align: center;
  min-width: 110px;
}
.risk-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.risk-val   { font-size: 22px; font-weight: 600; }
.risk-sub   { font-size: 9px; color: var(--muted); margin-top: 3px; }
#risk-card.warn { border-color: rgba(248,113,113,0.4); }
</style>
</head>
<body>

<aside>
  <!-- BRAND -->
  <div class="brand">
    <div class="brand-name">GNSS IQ Viewer</div>
    <div class="brand-sub">SDR · L1 · 1575.42 MHz</div>
    <div class="status-row">
      <div class="chip"><div class="chip-dot" id="d-gen"></div>Gen</div>
      <div class="chip"><div class="chip-dot" id="d-fed"></div>Fed</div>
      <div class="chip"><div class="chip-dot" id="d-fix"></div>Fix</div>
      <div class="chip" style="margin-left:auto;font-size:10px;color:var(--muted)">
        <span id="hns">—</span>&thinsp;samp&ensp;<span id="hfs">—</span>&thinsp;MHz
      </div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="section">
    <div class="section-title"><span class="step-num">1</span> Generate IQ</div>

    <div class="row single">
      <div class="field">
        <label>Scenario</label>
        <select id="sim-scenario">
          <option value="gnss">Clean GNSS L1</option>
          <option value="spoofed">Spoofed — CW tone</option>
          <option value="multipath">Multipath</option>
          <option value="noise">Noise only</option>
          <option value="jamming">CW Jamming</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Samples</label>
        <select id="sim-n">
          <option value="4096">4 K</option>
          <option value="16384" selected>16 K</option>
          <option value="65536">64 K</option>
          <option value="262144">256 K</option>
        </select>
      </div>
      <div class="field">
        <label>SNR (dB)</label>
        <input type="number" id="sim-snr" value="15" step="1">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Doppler (Hz)</label>
        <input type="number" id="sim-doppler" value="800" step="100">
      </div>
      <div class="field">
        <label>Fs (MHz)</label>
        <input type="number" id="fs" value="4" step="0.5" min="0.1">
      </div>
    </div>

    <button class="btn btn-primary" id="btn-gen">⚡ Generate</button>
    <div class="hint" id="rbadge">IQ ready — proceed to Feed ↓</div>
  </div>

  <!-- PLOTS -->
  <div class="section">
    <div class="canvas-wrap">
      <div class="canvas-label">Constellation</div>
      <canvas id="iq-cv" width="260" height="140"></canvas>
    </div>
    <div class="canvas-wrap" style="margin-bottom:0">
      <div class="canvas-label">Spectrum</div>
      <canvas id="fft-cv" width="260" height="80"></canvas>
    </div>
  </div>

  <!-- STATS -->
  <div class="section">
    <div class="stats-strip">
      <div class="stat"><div class="stat-k">Samples</div><div class="stat-v" id="s-n">—</div></div>
      <div class="stat"><div class="stat-k">Power</div><div class="stat-v" id="s-pwr">—</div></div>
      <div class="stat"><div class="stat-k">I std</div><div class="stat-v" id="s-is">—</div></div>
      <div class="stat"><div class="stat-k">Q std</div><div class="stat-v" id="s-qs">—</div></div>
      <div class="stat"><div class="stat-k">I mean</div><div class="stat-v" id="s-im">—</div></div>
      <div class="stat"><div class="stat-k">Q mean</div><div class="stat-v" id="s-qm">—</div></div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="section">
    <div class="section-title"><span class="step-num">2</span> Feed &amp; Locate</div>
    <div class="row">
      <div class="field">
        <label>Latitude</label>
        <input type="text" id="lat-in" placeholder="6.9271">
      </div>
      <div class="field">
        <label>Longitude</label>
        <input type="text" id="lon-in" placeholder="79.8612">
      </div>
    </div>
    <div class="row single" style="margin-bottom:10px">
      <div class="field">
        <label>Label</label>
        <input type="text" id="lbl-in" placeholder="RX site">
      </div>
    </div>
    <button class="btn btn-blue" id="btn-feed" disabled>📡 Feed IQ → Show Location</button>
    <button class="btn btn-ghost" id="btn-clear" style="margin-top:6px">Clear</button>
  </div>

  <!-- FILE -->
  <div class="section">
    <div class="section-title">Load from file</div>
    <div id="dropzone">
      <input type="file" id="file-input" accept=".bin,.iq,.cf32,.cs16,.cs8,.nmea,.txt,.csv">
      <div id="dz-hint">Drop file or click<br><span style="color:#334155;font-size:10px">cf32 · cs16 · cs8 · nmea · csv</span></div>
      <div id="dz-file"></div>
    </div>
    <div class="row">
      <div class="field">
        <label>Format</label>
        <select id="fmt">
          <option value="cf32">Float32</option>
          <option value="cs16">Int16</option>
          <option value="cs8">Int8</option>
          <option value="nmea">NMEA</option>
          <option value="csv">CSV</option>
        </select>
      </div>
      <div class="field">
        <label>Fc (MHz)</label>
        <input type="number" id="fc" value="1575.42" step="0.01">
      </div>
    </div>
    <button class="btn btn-ghost" id="btn-parse" disabled>▶ Parse File</button>
  </div>

  <!-- LOG -->
  <div class="section" style="flex:1">
    <div class="section-title">Log</div>
    <div id="log"></div>
  </div>
</aside>

<main>
  <div id="map"></div>

  <div class="map-card" id="fix-card">
    <div class="fix-label">Location Fix</div>
    <div class="fix-coords" id="fix-coords"></div>
  </div>

  <div class="map-card" id="risk-card">
    <div class="risk-label">Spoofing Risk</div>
    <div class="risk-val" id="risk-val">—</div>
    <div class="risk-sub" id="risk-sub"></div>
  </div>
</main>

<script>
function initApp() {
  if (typeof L === 'undefined') { setTimeout(initApp, 50); return; }

  var iqData = null, simMeta = null, curFile = null, pins = [];

  // MAP
  var map = L.map('map', { zoomControl: false }).setView([6.9271, 79.8612], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  function mkIcon(color) {
    return L.divIcon({ className: '',
      html: '<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg">'
          + '<path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 23 13 23s13-13.25 13-23C26 5.82 20.18 0 13 0z" fill="' + color + '"/>'
          + '<circle cx="13" cy="13" r="5" fill="#0f1117"/></svg>',
      iconSize: [26, 36], iconAnchor: [13, 36], popupAnchor: [0, -36]
    });
  }

  function lg(msg, cls) {
    var el = document.getElementById('log');
    var ts = new Date().toLocaleTimeString('en', { hour12: false });
    el.innerHTML += '<div class="' + (cls || 'inf') + '">' + ts + '  ' + msg + '</div>';
    el.scrollTop = el.scrollHeight;
  }
  function dot(id, on) {
    var d = document.getElementById('d-' + id);
    if (d) d.className = 'chip-dot' + (on ? ' on' : '');
  }
  function sv(id, v) { document.getElementById(id).textContent = v; }

  // BUTTONS
  document.getElementById('btn-gen').addEventListener('click', doGenerate);
  document.getElementById('btn-feed').addEventListener('click', doFeed);
  document.getElementById('btn-clear').addEventListener('click', doClear);
  document.getElementById('btn-parse').addEventListener('click', doParseFile);

  var dz = document.getElementById('dropzone'), fi = document.getElementById('file-input');
  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]); });
  fi.addEventListener('change', function() { if (fi.files[0]) onFile(fi.files[0]); });

  // GENERATE
  function doGenerate() {
    var sc = document.getElementById('sim-scenario').value;
    var N  = parseInt(document.getElementById('sim-n').value, 10);
    var snr = parseFloat(document.getElementById('sim-snr').value);
    var fd = parseFloat(document.getElementById('sim-doppler').value) / (parseFloat(document.getElementById('fs').value) * 1e6 || 4e6);
    var ns = Math.sqrt(0.5 / Math.pow(10, snr / 10));
    var I = new Float32Array(N), Q = new Float32Array(N);

    function rn() { var u; do { u = Math.random(); } while (!u); return Math.sqrt(-2*Math.log(u)) * Math.cos(6.2832*Math.random()); }

    if (sc === 'gnss') {
      var spc = (parseFloat(document.getElementById('fs').value)*1e6||4e6) / 1.023e6;
      var prn = new Int8Array(1023), reg = 0x1FF;
      for (var i = 0; i < 1023; i++) { var b = ((reg>>8)^(reg>>4))&1; prn[i]=b?1:-1; reg=((reg<<1)|b)&0x1FF; }
      for (var n = 0; n < N; n++) { var c=prn[Math.floor(n/spc)%1023], ph=6.2832*fd*n; I[n]=c*Math.cos(ph)+ns*rn(); Q[n]=c*Math.sin(ph)+ns*rn(); }
    } else if (sc === 'spoofed') {
      for (var n=0;n<N;n++){var ph=6.2832*fd*n+0.3; I[n]=Math.cos(ph)+ns*0.05*rn(); Q[n]=Math.sin(ph)+ns*0.05*rn();}
    } else if (sc === 'multipath') {
      for (var n=0;n<N;n++){var p1=6.2832*fd*n,p2=6.2832*(fd*1.001)*(n-20),r=n>=20?0.5:0; I[n]=Math.cos(p1)+r*Math.cos(p2)+ns*rn(); Q[n]=Math.sin(p1)+r*Math.sin(p2)+ns*rn();}
    } else if (sc === 'noise') {
      for (var n=0;n<N;n++){I[n]=rn();Q[n]=rn();}
    } else {
      for (var n=0;n<N;n++){var ph=6.2832*0.1*n; I[n]=10*Math.cos(ph)+ns*rn(); Q[n]=10*Math.sin(ph)+ns*rn();}
    }

    iqData = {I:I,Q:Q,n:N}; simMeta = {scenario:sc}; curFile = null;
    document.getElementById('lat-in').value = '6.9271';
    document.getElementById('lon-in').value = '79.8612';
    document.getElementById('lbl-in').value = sc;
    sv('hns', N > 1e3 ? (N/1000).toFixed(0)+'K' : N);
    sv('hfs', document.getElementById('fs').value);
    dot('gen','on'); dot('fed',''); dot('fix','');
    lg('Generated ' + sc + ' · ' + N.toLocaleString() + ' samples · SNR ' + snr + ' dB', 'ok');
    computeStats(); drawIQ(I,Q); drawFFT(I,Q);
    document.getElementById('btn-feed').disabled = false;
    document.getElementById('rbadge').style.display = 'block';
  }

  // FEED
  function doFeed() {
    if (!iqData) { lg('No IQ data.', 'wn'); return; }
    var lat = parseFloat(document.getElementById('lat-in').value);
    var lon = parseFloat(document.getElementById('lon-in').value);
    var lbl = document.getElementById('lbl-in').value || 'RX';
    if (isNaN(lat)||isNaN(lon)) { lg('Bad coordinates.', 'wn'); return; }
    lg('Feeding IQ → resolving…', 'inf');
    setTimeout(function() {
      var sc = (simMeta && simMeta.scenario) || 'fix';
      var col = sc==='spoofed'?'#f87171':sc==='jamming'?'#fbbf24':'#34d399';
      var m = L.marker([lat,lon], {icon: mkIcon(col)}).addTo(map);
      m.bindPopup('<span style="font-family:monospace;font-size:12px"><b>' + lbl + '</b><br>' + lat.toFixed(6) + ', ' + lon.toFixed(6) + '</span>');
      pins.push(m);
      map.setView([lat,lon], 14);
      document.getElementById('fix-card').style.display = 'block';
      document.getElementById('fix-coords').innerHTML = lat.toFixed(6) + '°<br>' + lon.toFixed(6) + '°';
      dot('fed','on'); dot('fix','on');
      lg('Fix: ' + lat.toFixed(5) + ', ' + lon.toFixed(5), 'ok');
      doAssess();
    }, 280);
  }

  // CLEAR
  function doClear() {
    pins.forEach(function(m){map.removeLayer(m);}); pins=[];
    iqData=null; simMeta=null; curFile=null;
    document.getElementById('fix-card').style.display='none';
    document.getElementById('risk-card').style.display='none';
    document.getElementById('rbadge').style.display='none';
    document.getElementById('btn-feed').disabled=true;
    document.getElementById('btn-parse').disabled=true;
    document.getElementById('dz-file').textContent='';
    ['gen','fed','fix'].forEach(function(d){dot(d,'');});
    ['s-n','s-pwr','s-im','s-qm','s-is','s-qs','hns','hfs'].forEach(function(id){sv(id,'—');});
    drawIQ(null,null); drawFFT(null,null);
    lg('Cleared.', 'inf');
  }

  // FILE
  function onFile(f) {
    curFile=f; document.getElementById('dz-file').textContent=f.name;
    var ext=f.name.split('.').pop().toLowerCase();
    var fmt=document.getElementById('fmt');
    if(['nmea','txt'].indexOf(ext)>=0) fmt.value='nmea';
    else if(ext==='cs16') fmt.value='cs16';
    else if(ext==='cs8') fmt.value='cs8';
    else if(ext==='csv') fmt.value='csv';
    else fmt.value='cf32';
    document.getElementById('btn-parse').disabled=false;
    lg('Loaded: '+f.name, 'ok');
  }
  function doParseFile() {
    if(!curFile){lg('No file.','wn');return;}
    var fmt=document.getElementById('fmt').value, r=new FileReader();
    lg('Parsing '+fmt+'…','inf');
    if(fmt==='nmea'||fmt==='csv'){r.onload=function(e){fmt==='nmea'?pNMEA(e.target.result):pCSV(e.target.result);};r.readAsText(curFile);}
    else{r.onload=function(e){pBin(e.target.result,fmt);};r.readAsArrayBuffer(curFile);}
  }
  function pBin(buf,fmt){
    var I,Q,n;
    if(fmt==='cf32'){var f=new Float32Array(buf);n=f.length>>1;I=new Float32Array(n);Q=new Float32Array(n);for(var i=0;i<n;i++){I[i]=f[2*i];Q[i]=f[2*i+1];}}
    else if(fmt==='cs16'){var s=new Int16Array(buf);n=s.length>>1;I=new Float32Array(n);Q=new Float32Array(n);for(var i=0;i<n;i++){I[i]=s[2*i]/32768;Q[i]=s[2*i+1]/32768;}}
    else{var s=new Int8Array(buf);n=s.length>>1;I=new Float32Array(n);Q=new Float32Array(n);for(var i=0;i<n;i++){I[i]=s[2*i]/128;Q[i]=s[2*i+1]/128;}}
    iqData={I:I,Q:Q,n:n};simMeta=null;
    sv('hns',n.toLocaleString());sv('hfs',document.getElementById('fs').value);
    computeStats();drawIQ(I,Q);drawFFT(I,Q);
    document.getElementById('btn-feed').disabled=false;
    document.getElementById('rbadge').style.display='block';
    dot('gen','on');lg('Parsed '+n.toLocaleString()+' samples','ok');
  }
  function pCSV(txt){
    var lines=txt.trim().split('\n').filter(function(l){return l.trim()&&l[0]!=='#';});
    var Is=[],Qs=[];
    lines.forEach(function(l){var p=l.split(/[,\t ]+/);if(p.length>=2){Is.push(+p[0]);Qs.push(+p[1]);}});
    iqData={I:new Float32Array(Is),Q:new Float32Array(Qs),n:Is.length};simMeta=null;
    computeStats();drawIQ(iqData.I,iqData.Q);drawFFT(iqData.I,iqData.Q);
    document.getElementById('btn-feed').disabled=false;
    document.getElementById('rbadge').style.display='block';
    dot('gen','on');lg('CSV: '+Is.length+' samples','ok');
  }
  function pNMEA(txt){
    var lat=null,lon=null;
    txt.split('\n').forEach(function(raw){
      var l=raw.trim();if(lat!==null)return;
      if(l.startsWith('$GPGGA')||l.startsWith('$GNGGA')){var r=parseNS(l,2,3,4,5);if(r){lat=r.lat;lon=r.lon;}}
      else if(l.startsWith('$GPRMC')||l.startsWith('$GNRMC')){var r=parseNS(l,3,4,5,6);if(r){lat=r.lat;lon=r.lon;}}
    });
    if(lat!==null){
      document.getElementById('lat-in').value=lat.toFixed(7);
      document.getElementById('lon-in').value=lon.toFixed(7);
      iqData={I:new Float32Array(0),Q:new Float32Array(0),n:0};simMeta=null;
      document.getElementById('btn-feed').disabled=false;
      document.getElementById('rbadge').style.display='block';
      dot('gen','on');lg('NMEA fix: '+lat.toFixed(5)+', '+lon.toFixed(5),'ok');
    } else lg('No NMEA fix.','wn');
  }
  function parseNS(ln,li,lh,lo,loh){
    var p=ln.split(',');if(p.length<Math.max(li,lh,lo,loh)+1)return null;
    function dmm(r,h){if(!r)return null;var d=r.indexOf('.'),dl=d-2,deg=+r.substring(0,dl),min=+r.substring(dl),v=deg+min/60;return(h==='S'||h==='W')?-v:v;}
    var lat=dmm(p[li],p[lh]),lon=dmm(p[lo],p[loh]);
    return(lat!==null&&lon!==null&&!isNaN(lat)&&!isNaN(lon))?{lat:lat,lon:lon}:null;
  }

  // STATS
  function computeStats(){
    if(!iqData||iqData.n===0)return;
    var I=iqData.I,Q=iqData.Q,sub=Math.min(iqData.n,8192);
    var si=0,sq=0,sp=0;
    for(var i=0;i<sub;i++){si+=I[i];sq+=Q[i];sp+=I[i]*I[i]+Q[i]*Q[i];}
    var mi=si/sub,mq=sq/sub,mp=sp/sub,vi=0,vq=0;
    for(var i=0;i<sub;i++){vi+=(I[i]-mi)*(I[i]-mi);vq+=(Q[i]-mq)*(Q[i]-mq);}
    sv('s-n',iqData.n>999?(iqData.n/1000).toFixed(0)+'K':iqData.n);
    sv('s-pwr',(10*Math.log10(mp+1e-12)).toFixed(1)+'dB');
    sv('s-im',mi.toFixed(3));sv('s-qm',mq.toFixed(3));
    sv('s-is',Math.sqrt(vi/sub).toFixed(3));sv('s-qs',Math.sqrt(vq/sub).toFixed(3));
  }

  // CONSTELLATION
  function drawIQ(I,Q){
    var cv=document.getElementById('iq-cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
    ctx.fillStyle='#0f1117';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.03)';
    for(var r=1;r<=3;r++){ctx.beginPath();ctx.arc(W/2,H/2,r*Math.min(W,H)/8,0,6.2832);ctx.stroke();}
    if(!I||!Q||!I.length){
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='10px Inter';ctx.textAlign='center';
      ctx.fillText('no data',W/2,H/2+4);return;
    }
    var sub=Math.min(I.length,2000),mx=0;
    for(var i=0;i<sub;i++){var v=Math.max(Math.abs(I[i]),Math.abs(Q[i]));if(v>mx)mx=v;}
    if(!mx)mx=1;
    var sc=Math.min(W,H)*0.42/mx;
    ctx.fillStyle='rgba(52,211,153,0.55)';
    for(var i=0;i<sub;i++){ctx.beginPath();ctx.arc(W/2+I[i]*sc,H/2-Q[i]*sc,1.2,0,6.2832);ctx.fill();}
  }

  // FFT
  function fft(re,im){
    var n=re.length;if(n<=1)return;
    var h=n>>1,rE=new Float32Array(h),iE=new Float32Array(h),rO=new Float32Array(h),iO=new Float32Array(h);
    for(var i=0;i<h;i++){rE[i]=re[2*i];iE[i]=im[2*i];rO[i]=re[2*i+1];iO[i]=im[2*i+1];}
    fft(rE,iE);fft(rO,iO);
    for(var k=0;k<h;k++){
      var t=-6.2832*k/n,cr=Math.cos(t),ci=Math.sin(t),tr=cr*rO[k]-ci*iO[k],ti=cr*iO[k]+ci*rO[k];
      re[k]=rE[k]+tr;im[k]=iE[k]+ti;re[k+h]=rE[k]-tr;im[k+h]=iE[k]-ti;
    }
  }
  function drawFFT(I,Q){
    var cv=document.getElementById('fft-cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
    ctx.fillStyle='#0f1117';ctx.fillRect(0,0,W,H);
    if(!I||!Q||!I.length){
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='10px Inter';ctx.textAlign='center';
      ctx.fillText('no spectrum',W/2,H/2+4);return;
    }
    var N=512,sub=Math.min(I.length,N),re=new Float32Array(N),im=new Float32Array(N);
    for(var i=0;i<sub;i++){var w=0.5-0.5*Math.cos(6.2832*i/sub);re[i]=I[i]*w;im[i]=Q[i]*w;}
    fft(re,im);
    var mag=new Float32Array(N),mn=1e9,mx=-1e9;
    for(var i=0;i<N;i++){var idx=(i+N/2)%N;mag[i]=10*Math.log10(re[idx]*re[idx]+im[idx]*im[idx]+1e-12);if(mag[i]<mn)mn=mag[i];if(mag[i]>mx)mx=mag[i];}
    var rng=mx-mn||1;
    // Fill under curve
    ctx.fillStyle='rgba(96,165,250,0.1)';
    ctx.beginPath();ctx.moveTo(0,H);
    for(var i=0;i<N;i++){var x=i/N*W,y=H-(mag[i]-mn)/rng*(H-6)-3;i===0?ctx.lineTo(x,y):ctx.lineTo(x,y);}
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(96,165,250,0.8)';ctx.lineWidth=1;ctx.beginPath();
    for(var i=0;i<N;i++){var x=i/N*W,y=H-(mag[i]-mn)/rng*(H-6)-3;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();
    // Center line
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  }

  // ASSESS
  function doAssess(){
    var rc=document.getElementById('risk-card'),rv=document.getElementById('risk-val'),rs=document.getElementById('risk-sub');
    var risk=0,reasons=[];
    if(simMeta){
      var s=simMeta.scenario;
      if(s==='spoofed'){risk=85;reasons=['CW tone','flat power'];}
      else if(s==='jamming'){risk=65;reasons=['CW jammer'];}
      else if(s==='noise'){risk=20;reasons=['no coherent signal'];}
      else if(s==='multipath'){risk=35;reasons=['multipath'];}
      else{risk=5;reasons=['nominal'];}
    } else if(iqData&&iqData.n>0){
      var I=iqData.I,Q=iqData.Q,sub=Math.min(iqData.n,4096),sp=0;
      for(var i=0;i<sub;i++)sp+=I[i]*I[i]+Q[i]*Q[i];
      var mp=sp/sub,vp=0;
      for(var i=0;i<sub;i++){var d=I[i]*I[i]+Q[i]*Q[i]-mp;vp+=d*d;}
      vp/=sub;
      var si=0,sq=0,si2=0,sq2=0;
      for(var i=0;i<sub;i++){si+=I[i];sq+=Q[i];si2+=I[i]*I[i];sq2+=Q[i]*Q[i];}
      var sI=Math.sqrt(si2/sub-(si/sub)*(si/sub)),sQ=Math.sqrt(sq2/sub-(sq/sub)*(sq/sub));
      var imb=Math.abs(sI-sQ)/(sI+sQ+1e-9),cv=Math.sqrt(vp)/(mp+1e-9);
      if(imb>0.15){risk+=30;reasons.push('IQ imbal');}
      if(cv<0.05){risk+=40;reasons.push('flat power');}
      if(mp<1e-6){risk+=20;reasons.push('weak sig');}
    }
    rc.style.display='block';
    rc.className='map-card'+(risk>50?' warn':'');
    rv.textContent=risk>60?'HIGH':risk>30?'MED':'LOW';
    rv.style.color=risk>60?'var(--red)':risk>30?'var(--amber)':'var(--green)';
    rs.textContent=reasons.join(' · ')||'nominal';
  }

  drawIQ(null,null); drawFFT(null,null);
  lg('Ready — generate IQ then feed to map.','ok');
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
